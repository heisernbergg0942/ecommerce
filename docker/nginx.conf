server {
    listen 8080 default_server;
    root /var/www/public;
    index index.php;

    # Railway sends the real port via PORT env — Nginx doesn't resolve env vars,
    # so we hardcode 8080 (Railway proxies from $PORT to 8080).
    # If $PORT differs on your Railway setup, Railway auto-proxies to the
    # container's EXPOSEd port anyway.

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";

    charset utf-8;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    # Block access to dot files
    location ~ /\.(?!well-known).* {
        deny all;
    }

    # Prevent access to sensitive Laravel paths
    location ~ ^/(composer\.(json|lock)|artisan|package\.json|vite\.config\.js)$ {
        deny all;
        return 404;
    }

    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
